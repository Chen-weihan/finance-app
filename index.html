<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>公司財務記帳</title>
<link rel="manifest" href="manifest.webmanifest">
<meta name="theme-color" content="#2f6fed">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="記帳">
<link rel="apple-touch-icon" href="icons/apple-touch-icon.png">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  :root{
    --bg:#f4f6f9; --card:#ffffff; --ink:#1f2933; --muted:#7b8794;
    --line:#e4e8ee; --brand:#2f6fed; --brand-soft:#eaf1ff;
    --income:#12a150; --income-soft:#e6f7ee;
    --expense:#e5484d; --expense-soft:#fdecec;
    --shadow:0 1px 3px rgba(16,24,40,.06),0 1px 2px rgba(16,24,40,.04);
  }
  *{box-sizing:border-box}
  body{margin:0;font-family:-apple-system,"PingFang TC","Helvetica Neue",Arial,sans-serif;
    background:var(--bg);color:var(--ink);line-height:1.5;-webkit-font-smoothing:antialiased}
  .wrap{max-width:960px;margin:0 auto;padding:24px 16px 64px}
  header.top{display:flex;align-items:center;justify-content:space-between;gap:12px;flex-wrap:wrap;margin-bottom:20px}
  h1{font-size:22px;margin:0;font-weight:700;letter-spacing:.5px}
  h1 .sub{display:block;font-size:12px;color:var(--muted);font-weight:400;margin-top:2px}
  .month-pick{display:flex;align-items:center;gap:8px;background:var(--card);border:1px solid var(--line);
    border-radius:10px;padding:6px 10px;box-shadow:var(--shadow)}
  .month-pick label{font-size:13px;color:var(--muted)}
  input,select,button{font-family:inherit;font-size:14px}
  input[type=month],input[type=date],input[type=number],input[type=text],input[type=email],input[type=password],select{
    border:1px solid var(--line);border-radius:8px;padding:9px 10px;background:#fff;color:var(--ink);width:100%}
  input:focus,select:focus{outline:2px solid var(--brand-soft);border-color:var(--brand)}

  .cards{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:20px}
  .card{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:16px 18px;box-shadow:var(--shadow)}
  .card .k{font-size:13px;color:var(--muted);margin-bottom:6px}
  .card .v{font-size:26px;font-weight:700;letter-spacing:.5px}
  .card.income .v{color:var(--income)} .card.expense .v{color:var(--expense)}
  .card.net .v.pos{color:var(--income)} .card.net .v.neg{color:var(--expense)}

  .grid2{display:grid;grid-template-columns:1fr 1fr;gap:16px;align-items:start}
  .panel{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:18px;box-shadow:var(--shadow);margin-bottom:16px}
  .panel h2{font-size:15px;margin:0 0 14px;font-weight:700}
  .row{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:10px}
  .row.full{grid-template-columns:1fr}
  .field label{display:block;font-size:12px;color:var(--muted);margin-bottom:4px}
  .seg{display:flex;gap:6px;margin-bottom:10px}
  .seg button{flex:1;border:1px solid var(--line);background:#fff;border-radius:8px;padding:9px;cursor:pointer;color:var(--muted);font-weight:600}
  .seg button.on-income{background:var(--income-soft);border-color:var(--income);color:var(--income)}
  .seg button.on-expense{background:var(--expense-soft);border-color:var(--expense);color:var(--expense)}
  .btn-primary{width:100%;background:var(--brand);color:#fff;border:none;border-radius:9px;padding:11px;font-weight:700;cursor:pointer;margin-top:4px}
  .btn-primary:hover{filter:brightness(1.05)}
  .btn-primary:disabled{opacity:.6;cursor:default}
  .btn-ghost{background:#fff;border:1px solid var(--line);border-radius:8px;padding:7px 12px;cursor:pointer;color:var(--ink);font-size:13px}
  .btn-ghost:hover{background:var(--bg)}

  .bar-row{display:flex;align-items:center;gap:10px;margin-bottom:9px;font-size:13px}
  .bar-row .lbl{width:78px;color:var(--muted);flex:none;text-align:right}
  .bar-track{flex:1;background:var(--bg);border-radius:6px;height:20px;overflow:hidden}
  .bar-fill{height:100%;border-radius:6px;transition:width .3s}
  .bar-row .amt{width:86px;flex:none;text-align:right;font-variant-numeric:tabular-nums}
  .legend{display:flex;gap:16px;font-size:12px;color:var(--muted);margin-bottom:12px}
  .dot{display:inline-block;width:9px;height:9px;border-radius:50%;margin-right:5px;vertical-align:middle}

  table{width:100%;border-collapse:collapse;font-size:13.5px}
  th,td{padding:9px 8px;text-align:left;border-bottom:1px solid var(--line)}
  th{font-size:12px;color:var(--muted);font-weight:600}
  td.num{text-align:right;font-variant-numeric:tabular-nums;font-weight:600}
  .tag{display:inline-block;font-size:11px;padding:2px 8px;border-radius:20px;background:var(--bg);color:var(--muted)}
  .tag.i{background:var(--income-soft);color:var(--income)}
  .tag.e{background:var(--expense-soft);color:var(--expense)}
  .del{border:none;background:none;color:var(--muted);cursor:pointer;font-size:15px;padding:2px 6px;border-radius:6px}
  .del:hover{background:var(--expense-soft);color:var(--expense)}
  .empty{text-align:center;color:var(--muted);padding:26px 0;font-size:14px}
  .toolbar{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;gap:10px;flex-wrap:wrap}
  .foot{text-align:center;color:var(--muted);font-size:12px;margin-top:26px}
  .userbox{display:flex;align-items:center;gap:8px;font-size:12px;color:var(--muted)}
  .synced{font-size:11px;color:var(--income);background:var(--income-soft);padding:2px 8px;border-radius:20px}

  /* 登入畫面 */
  .login-wrap{max-width:380px;margin:8vh auto 0;padding:0 20px}
  .login-card{background:var(--card);border:1px solid var(--line);border-radius:16px;padding:28px 24px;box-shadow:var(--shadow);text-align:center}
  .login-card .logo{width:64px;height:64px;border-radius:16px;margin:0 auto 14px;display:block}
  .login-card h1{font-size:20px;margin:0 0 4px}
  .login-card p.hint{font-size:13px;color:var(--muted);margin:0 0 20px}
  .login-card .field{text-align:left;margin-bottom:12px}
  .login-err{color:var(--expense);font-size:13px;min-height:18px;margin:4px 0 8px}
  @media(max-width:720px){.cards{grid-template-columns:1fr}.grid2{grid-template-columns:1fr}.row{grid-template-columns:1fr}}
</style>
</head>
<body>

<!-- 登入畫面 -->
<div id="loginScreen" class="login-wrap" style="display:none">
  <div class="login-card">
    <img class="logo" src="icons/icon-192.png" alt="">
    <h1>公司財務記帳</h1>
    <p class="hint">請登入以查看共用帳目</p>
    <div class="field"><label>Email</label><input type="email" id="loginEmail" placeholder="you@example.com" autocomplete="username"></div>
    <div class="field"><label>密碼</label><input type="password" id="loginPassword" placeholder="密碼" autocomplete="current-password"></div>
    <div class="login-err" id="loginErr"></div>
    <button class="btn-primary" id="loginBtn" onclick="doLogin()">登入</button>
    <p class="hint" style="margin-top:16px">帳號由管理者建立。忘記密碼或需要帳號，請聯絡管理者。</p>
  </div>
</div>

<!-- App 主畫面 -->
<div id="appScreen" class="wrap" style="display:none">
  <header class="top">
    <h1>公司財務記帳<span class="sub" id="companySub">雲端共用 · 大家看到同一份</span></h1>
    <div style="display:flex;align-items:center;gap:12px;flex-wrap:wrap">
      <div class="userbox"><span class="synced">☁ 已同步</span><span id="userEmail"></span><button class="btn-ghost" onclick="doLogout()">登出</button></div>
      <div class="month-pick">
        <label for="month">檢視月份</label>
        <input type="month" id="month">
      </div>
    </div>
  </header>

  <div class="cards">
    <div class="card income"><div class="k">本月收入</div><div class="v" id="sumIncome">$0</div></div>
    <div class="card expense"><div class="k">本月支出</div><div class="v" id="sumExpense">$0</div></div>
    <div class="card net"><div class="k">本月結餘</div><div class="v" id="sumNet">$0</div></div>
  </div>

  <div class="grid2">
    <div class="panel">
      <h2>記一筆</h2>
      <div class="seg">
        <button type="button" id="segIncome" class="on-income" onclick="setType('income')">收入</button>
        <button type="button" id="segExpense" onclick="setType('expense')">支出</button>
      </div>
      <div class="row">
        <div class="field"><label>分類</label><select id="category"></select></div>
        <div class="field"><label>金額</label><input type="number" id="amount" placeholder="0" min="0" step="1"></div>
      </div>
      <div class="row">
        <div class="field"><label>日期</label><input type="date" id="date"></div>
        <div class="field"><label>項目 / 備註</label><input type="text" id="note" placeholder="例：鴨翅40斤、黑貓運費"></div>
      </div>
      <button class="btn-primary" id="addBtn" onclick="addTx()">＋ 新增這一筆</button>
    </div>

    <div class="panel">
      <h2>本月收支結構</h2>
      <div class="legend">
        <span><span class="dot" style="background:var(--income)"></span>收入分類</span>
        <span><span class="dot" style="background:var(--expense)"></span>支出分類</span>
      </div>
      <div id="chart"><div class="empty">載入中…</div></div>
    </div>
  </div>

  <div class="panel">
    <h2>訂單 / 營收匯總（本月收入來源）</h2>
    <div id="revenue"><div class="empty">—</div></div>
  </div>

  <div class="panel">
    <div class="toolbar">
      <h2 style="margin:0">本月明細</h2>
      <div style="display:flex;gap:8px;flex-wrap:wrap">
        <input type="file" id="importFile" accept=".json,application/json" style="display:none" onchange="importJSON(event)">
        <button class="btn-ghost" onclick="document.getElementById('importFile').click()">⬆ 匯入備份</button>
        <button class="btn-ghost" onclick="backupJSON()">💾 備份</button>
        <button class="btn-ghost" onclick="exportCSV()">⬇ 匯出 CSV（給會計）</button>
      </div>
    </div>
    <table>
      <thead><tr><th>日期</th><th>類型</th><th>分類</th><th>項目</th><th style="text-align:right">金額</th><th></th></tr></thead>
      <tbody id="txBody"></tbody>
    </table>
    <div id="txEmpty" class="empty" style="display:none">這個月還沒有任何紀錄，從左上角「記一筆」開始吧！</div>
  </div>

  <div class="foot">資料儲存在雲端（Supabase）。所有登入的人看到同一份，即時共用。</div>
</div>

<script>
  // ===== Supabase 設定 =====
  const SUPABASE_URL = 'https://klswfpxrgzakcaynwqsg.supabase.co';
  const SUPABASE_ANON = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imtsc3dmcHhyZ3pha2NheW53cXNnIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODI4NzA1NTAsImV4cCI6MjA5ODQ0NjU1MH0.mvwxRTqPSETCWHD_d3FVola3vb5WndvPohbuAomTwTk';
  const sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON);

  const CATS = {
    income:{
      '銷售收入':['批發訂單','門市 / 現金'],
      '其他':['其他收入']
    },
    expense:{
      '原料 / 進貨':['鴨肉原料','豬肉原料','雞肉原料','豆製品','辛香料','食材'],
      '人事費用':['工資 / 人力','勞健保費'],
      '營運 / 製造費用':['包裝材料','設備 / 維修','水電瓦斯費','房租','運費','交通'],
      '管理 / 銷售費用':['廣告 / 行銷費','佣金 / 分潤支出','軟體 / 資訊費','專業服務費','保險費'],
      '其他':['生活日用品','雜貨','餐飲','公益 / 祥事','其他支出']
    }
  };

  let TX = [];         // 目前記憶體中的所有交易（來自雲端）
  let txType = 'income';
  let currentUser = null;

  const fmt = (n) => '$' + Math.round(n).toLocaleString('en-US');
  const uid = () => Date.now().toString(36) + Math.floor(Math.random()*1e5).toString(36);

  // ===== 登入 / 登出 =====
  async function doLogin(){
    const email = document.getElementById('loginEmail').value.trim();
    const password = document.getElementById('loginPassword').value;
    const err = document.getElementById('loginErr');
    const btn = document.getElementById('loginBtn');
    err.textContent = '';
    if(!email || !password){ err.textContent = '請輸入 Email 和密碼'; return; }
    btn.disabled = true; btn.textContent = '登入中…';
    const { error } = await sb.auth.signInWithPassword({ email, password });
    btn.disabled = false; btn.textContent = '登入';
    if(error){ err.textContent = '登入失敗：' + (error.message==='Invalid login credentials' ? '帳號或密碼錯誤' : error.message); }
    // 成功會由 onAuthStateChange 接手
  }
  async function doLogout(){ await sb.auth.signOut(); location.reload(); }

  function showLogin(){
    document.getElementById('appScreen').style.display='none';
    document.getElementById('loginScreen').style.display='block';
  }
  function showApp(user){
    currentUser = user;
    document.getElementById('loginScreen').style.display='none';
    document.getElementById('appScreen').style.display='block';
    document.getElementById('userEmail').textContent = user.email;
  }

  // ===== 資料存取（雲端）=====
  async function fetchAll(){
    const { data, error } = await sb.from('transactions').select('*').order('date',{ascending:false});
    if(error){ console.error(error); return; }
    TX = (data||[]).map(r=>({id:r.id,type:r.type,category:r.category,amount:Number(r.amount),date:r.date,note:r.note||''}));
    render();
  }

  function currentMonth(){ return document.getElementById('month').value; }

  function setType(t){
    txType = t;
    document.getElementById('segIncome').className = t==='income'?'on-income':'';
    document.getElementById('segExpense').className = t==='expense'?'on-expense':'';
    const sel = document.getElementById('category');
    sel.innerHTML = Object.entries(CATS[t]).map(([g,items])=>
      `<optgroup label="${g}">` + items.map(c=>`<option>${c}</option>`).join('') + `</optgroup>`
    ).join('');
  }

  async function addTx(){
    const amount = parseFloat(document.getElementById('amount').value);
    const date = document.getElementById('date').value;
    if(!date){ alert('請選擇日期'); return; }
    if(!amount || amount<=0){ alert('請輸入大於 0 的金額'); return; }
    const rec = { id: uid(), type: txType, category: document.getElementById('category').value,
                  amount: amount, date: date, note: document.getElementById('note').value.trim() };
    const btn = document.getElementById('addBtn');
    btn.disabled = true; btn.textContent = '儲存中…';
    const { error } = await sb.from('transactions').insert(rec);
    btn.disabled = false; btn.textContent = '＋ 新增這一筆';
    if(error){ alert('新增失敗：' + error.message); return; }
    document.getElementById('amount').value='';
    document.getElementById('note').value='';
    const m = date.slice(0,7);
    if(m !== currentMonth()) document.getElementById('month').value = m;
    await fetchAll();
  }

  async function delTx(id){
    if(!confirm('確定刪除這一筆？（會從雲端一起刪除）')) return;
    const { error } = await sb.from('transactions').delete().eq('id', id);
    if(error){ alert('刪除失敗：' + error.message); return; }
    await fetchAll();
  }

  function monthTx(){
    const m = currentMonth();
    return TX.filter(t=>t.date && t.date.slice(0,7)===m).sort((a,b)=>b.date.localeCompare(a.date));
  }

  function render(){
    const list = monthTx();
    const inc = list.filter(t=>t.type==='income').reduce((s,t)=>s+t.amount,0);
    const exp = list.filter(t=>t.type==='expense').reduce((s,t)=>s+t.amount,0);
    const net = inc - exp;

    document.getElementById('sumIncome').textContent = fmt(inc);
    document.getElementById('sumExpense').textContent = fmt(exp);
    const netEl = document.getElementById('sumNet');
    netEl.textContent = (net<0?'-':'') + fmt(Math.abs(net));
    netEl.className = 'v ' + (net<0?'neg':'pos');

    const body = document.getElementById('txBody');
    const emptyEl = document.getElementById('txEmpty');
    if(list.length===0){ body.innerHTML=''; emptyEl.style.display='block'; }
    else{
      emptyEl.style.display='none';
      body.innerHTML = list.map(t=>`
        <tr>
          <td>${t.date.slice(5)}</td>
          <td><span class="tag ${t.type==='income'?'i':'e'}">${t.type==='income'?'收入':'支出'}</span></td>
          <td>${t.category}</td>
          <td>${t.note||'—'}</td>
          <td class="num" style="color:${t.type==='income'?'var(--income)':'var(--expense)'}">${t.type==='income'?'+':'-'}${fmt(t.amount)}</td>
          <td style="text-align:right"><button class="del" onclick="delTx('${t.id}')" title="刪除">✕</button></td>
        </tr>`).join('');
    }
    renderChart(list, inc, exp);
    renderRevenue(list, inc);
  }

  function groupBy(list, type){
    const map = {};
    list.filter(t=>t.type===type).forEach(t=>{ map[t.category]=(map[t.category]||0)+t.amount; });
    return Object.entries(map).sort((a,b)=>b[1]-a[1]);
  }

  function renderChart(list, inc, exp){
    const el = document.getElementById('chart');
    if(list.length===0){ el.innerHTML='<div class="empty">這個月還沒有紀錄</div>'; return; }
    const max = Math.max(inc, exp, 1);
    const rowsInc = groupBy(list,'income');
    const rowsExp = groupBy(list,'expense');
    const bar = (label, amount, color) => `
      <div class="bar-row">
        <span class="lbl">${label}</span>
        <span class="bar-track"><span class="bar-fill" style="width:${Math.max(2,amount/max*100)}%;background:${color}"></span></span>
        <span class="amt">${fmt(amount)}</span>
      </div>`;
    let html = '';
    if(rowsInc.length) html += rowsInc.map(([c,a])=>bar(c,a,'var(--income)')).join('');
    if(rowsExp.length) html += rowsExp.map(([c,a])=>bar(c,a,'var(--expense)')).join('');
    el.innerHTML = html;
  }

  function renderRevenue(list, inc){
    const el = document.getElementById('revenue');
    const rows = groupBy(list,'income');
    if(rows.length===0){ el.innerHTML='<div class="empty">這個月還沒有收入紀錄</div>'; return; }
    el.innerHTML = `<table><thead><tr><th>收入來源</th><th style="text-align:right">筆數</th><th style="text-align:right">金額</th><th style="text-align:right">佔比</th></tr></thead><tbody>` +
      rows.map(([c,a])=>{
        const count = list.filter(t=>t.type==='income'&&t.category===c).length;
        const pct = inc? Math.round(a/inc*100):0;
        return `<tr><td>${c}</td><td class="num">${count}</td><td class="num" style="color:var(--income)">${fmt(a)}</td><td class="num">${pct}%</td></tr>`;
      }).join('') +
      `<tr style="font-weight:700"><td>合計</td><td class="num">${list.filter(t=>t.type==='income').length}</td><td class="num" style="color:var(--income)">${fmt(inc)}</td><td class="num">100%</td></tr>` +
      `</tbody></table>`;
  }

  function exportCSV(){
    const list = monthTx();
    if(list.length===0){ alert('這個月沒有資料可以匯出'); return; }
    const header = ['日期','類型','分類','項目','金額'];
    const lines = list.map(t=>[t.date, t.type==='income'?'收入':'支出', t.category, (t.note||'').replace(/,/g,'，'), t.amount].join(','));
    const csv = '﻿' + header.join(',') + '\n' + lines.join('\n');
    const blob = new Blob([csv], {type:'text/csv;charset=utf-8'});
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = `財務明細_${currentMonth()}.csv`;
    a.click();
  }

  function backupJSON(){
    if(TX.length===0){ alert('目前沒有資料可以備份'); return; }
    const blob = new Blob([JSON.stringify(TX,null,1)], {type:'application/json'});
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = `財務備份_${new Date().toISOString().slice(0,10)}.json`;
    a.click();
  }

  async function importJSON(e){
    const file = e.target.files[0];
    if(!file){ return; }
    const reader = new FileReader();
    reader.onload = async () => {
      try{
        const incoming = JSON.parse(reader.result);
        if(!Array.isArray(incoming)) throw new Error('not array');
        const rows = incoming
          .filter(t=>t && t.id && t.date && t.amount && (t.type==='income'||t.type==='expense'))
          .map(t=>({id:String(t.id),type:t.type,category:t.category||'其他支出',amount:Number(t.amount),date:t.date,note:t.note||''}));
        if(rows.length===0){ alert('檔案裡沒有可匯入的資料'); e.target.value=''; return; }
        if(!confirm(`要把 ${rows.length} 筆資料匯入雲端嗎？（所有登入的人都會看到）`)){ e.target.value=''; return; }
        const { error } = await sb.from('transactions').upsert(rows, { onConflict:'id' });
        if(error){ alert('匯入失敗：' + error.message); e.target.value=''; return; }
        const first = rows.find(t=>t.date);
        if(first) document.getElementById('month').value = first.date.slice(0,7);
        await fetchAll();
        alert(`匯入完成！共 ${rows.length} 筆已同步到雲端`);
      }catch(err){
        alert('檔案格式不正確，請選擇本 App 匯出的備份 JSON 檔');
      }
      e.target.value='';
    };
    reader.readAsText(file);
  }

  // ===== 啟動 =====
  (function init(){
    const now = new Date();
    document.getElementById('month').value = now.toISOString().slice(0,7);
    document.getElementById('date').value = now.toISOString().slice(0,10);
    document.getElementById('month').addEventListener('change', render);
    setType('income');

    // 登入狀態變化
    sb.auth.onAuthStateChange((event, session)=>{
      if(session && session.user){
        showApp(session.user);
        fetchAll();
      }else{
        currentUser = null;
        showLogin();
      }
    });
    // 初始檢查
    sb.auth.getSession().then(({data})=>{
      if(data.session && data.session.user){ showApp(data.session.user); fetchAll(); }
      else showLogin();
    });
    // 回到頁面時重抓，讓大家看到最新
    window.addEventListener('focus', ()=>{ if(currentUser) fetchAll(); });
    // 即時更新（若專案有開 realtime 就會生效，沒開也不影響）
    sb.channel('tx-changes')
      .on('postgres_changes', {event:'*', schema:'public', table:'transactions'}, ()=>{ if(currentUser) fetchAll(); })
      .subscribe();
  })();

  if('serviceWorker' in navigator){
    window.addEventListener('load', ()=>navigator.serviceWorker.register('sw.js').catch(()=>{}));
  }
</script>
</body>
</html>
